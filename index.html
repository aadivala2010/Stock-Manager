<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Multi Asset Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .price-up { color: #16a34a; }
        .price-down { color: #dc2626; }
        .price-neutral { color: #111827; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(4px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        
        @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.5 } }
        .refresh-pulse { animation: pulse 0.5s ease-in-out; }
        
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.3s ease-in-out; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            will-change: transform;
            transform: translateZ(0);
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.96);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            border-color: rgba(255,255,255,0.8);
        }
        .glass-empty {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 2px dashed rgba(156,163,175,0.4);
            transition: all 0.3s;
        }
        .glass-empty:hover {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(96,165,250,0.5);
            transform: scale(0.98);
        }
        .glass-modal {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9eef5 100%);
            min-height: 100vh;
        }
        .glass-button {
            background: rgba(0, 122, 255, 0.95);
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .glass-button:hover {
            background: rgba(0, 122, 255, 1);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }
        .glass-input {
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(203,213,225,0.6);
        }
        .glass-input:focus {
            background: white;
            border-color: rgba(0,122,255,0.5);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
            outline: none;
        }
        .remove-button:hover svg { stroke: #ef4444; transform: scale(1.1); }
        * { -webkit-font-smoothing: antialiased; }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            align-items: start;
        }
        @media (max-width: 768px) {
            .dashboard-grid { 
                grid-template-columns: 1fr; 
                gap: 1.5rem; 
            }
        }
        .column-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.75rem;
        }
        .portfolio-footer {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            padding: 0.875rem 1rem;
            border: 1px solid rgba(255,255,255,0.6);
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        @media (max-width: 640px) {
            body { padding: 0.75rem; }
            .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 0.625rem; }
            .glass-card, .glass-empty { aspect-ratio: 1 / 1; min-height: auto; padding: 0.875rem; }
            .glass-card .text-2xl { font-size: 1.25rem; }
            .glass-card .text-sm { font-size: 0.7rem; }
            .glass-card h3 { font-size: 0.8rem; }
            h1 { font-size: 1.5rem !important; }
            h2 { font-size: 1.1rem !important; }
            .glass-header { padding: 0.75rem 1rem; margin-bottom: 1rem; border-radius: 1rem; }
            .global-refresh-btn { padding: 0.375rem 0.875rem; font-size: 0.8rem; }
            .column-container { gap: 0.5rem; }
            .glass-card .grid-cols-2 { gap: 0.25rem; }
            .portfolio-footer { padding: 0.75rem; margin-top: 0.375rem; }
            .portfolio-footer .text-xl { font-size: 1.1rem; }
            .bg-amber-100\/80 { padding: 0.25rem 0.625rem; font-size: 0.7rem; }
            .glass-modal { padding: 1.25rem; margin: 0.75rem; }
            .glass-modal h2 { font-size: 1.25rem !important; }
            .remove-button { top: 0.5rem; right: 0.5rem; padding: 0.375rem; }
            .glass-empty svg { width: 28px; height: 28px; }
            .glass-empty span { font-size: 0.7rem; }
        }
        @media (max-width: 380px) {
            .cards-grid { gap: 0.5rem; }
            .glass-card, .glass-empty { padding: 0.625rem; }
            .glass-card .text-2xl { font-size: 1.1rem; }
            h1 { font-size: 1.25rem !important; }
        }
        .asset-badge {
            display: inline-block;
            font-size: 0.6rem;
            font-weight: 600;
            padding: 0.1rem 0.4rem;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-left: 0.25rem;
        }
    </style>
</head>
<body class="min-h-screen p-3 sm:p-4 md:p-6">
    <div id="app"></div>
    <script>
        (function(){
            "use strict";

            // ---------- Service using Yahoo Finance (direct, no proxy) ----------
            const REFRESH_INTERVAL = 60000;
            
            class AssetService {
                constructor() {
                    this.cache = new Map();
                    this.CACHE_TTL = 55000;
                }

                _isCrypto(symbol) {
                    const upper = symbol.toUpperCase();
                    if (upper.includes('-USD')) return true;
                    const cryptoSymbols = ['BTC', 'ETH', 'SOL', 'DOGE', 'XRP', 'ADA', 'DOT', 'MATIC', 'LINK', 'AVAX', 'SHIB', 'LTC', 'BCH', 'XLM', 'ATOM', 'UNI', 'ETC', 'ALGO', 'VET', 'ICP', 'FIL', 'XTZ', 'EOS', 'AAVE', 'GRT', 'MKR', 'SNX', 'COMP', 'ZEC', 'BAT', 'ZRX', 'ENJ', 'MANA', 'SAND', 'GALA', 'AXS'];
                    return cryptoSymbols.includes(upper);
                }

                async _fetchCrypto(symbol) {
                    let coinId = symbol.toLowerCase().replace('-usd', '');
                    const map = { 
                        'btc':'bitcoin', 'eth':'ethereum', 'sol':'solana', 'doge':'dogecoin', 
                        'xrp':'ripple', 'ada':'cardano', 'dot':'polkadot', 'matic':'matic-network', 
                        'link':'chainlink', 'avax':'avalanche-2', 'shib':'shiba-inu', 'ltc':'litecoin',
                        'bch':'bitcoin-cash', 'xlm':'stellar', 'atom':'cosmos', 'uni':'uniswap',
                        'etc':'ethereum-classic', 'algo':'algorand', 'vet':'vechain', 'icp':'internet-computer',
                        'fil':'filecoin', 'xtz':'tezos', 'eos':'eos', 'aave':'aave', 'grt':'the-graph',
                        'mkr':'maker', 'snx':'synthetix-network-token', 'comp':'compound-governance-token', 
                        'zec':'zcash', 'bat':'basic-attention-token', 'zrx':'0x', 'enj':'enjincoin', 
                        'mana':'decentraland', 'sand':'the-sandbox', 'gala':'gala', 'axs':'axie-infinity'
                    };
                    coinId = map[coinId] || coinId;
                    
                    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coinId}&vs_currencies=usd&include_24hr_change=true`);
                    if (!res.ok) throw new Error('Crypto fetch failed');
                    const json = await res.json();
                    const data = json[coinId];
                    if (!data || data.usd === undefined) throw new Error('Invalid crypto');
                    
                    const price = data.usd;
                    const change24h = data.usd_24h_change || 0;
                    const previousPrice = price - change24h;
                    
                    let name = symbol.toUpperCase();
                    try {
                        const infoRes = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}`);
                        if (infoRes.ok) {
                            const info = await infoRes.json();
                            name = info.name || symbol;
                        }
                    } catch {}
                    
                    return {
                        symbol: symbol.toUpperCase(),
                        name,
                        price,
                        previousPrice,
                        lastUpdated: new Date(),
                        assetType: 'crypto'
                    };
                }

                async _fetchYahoo(symbol) {
                    // Use Yahoo Finance query API
                    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}`;
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('Yahoo fetch failed');
                    
                    const data = await res.json();
                    const chart = data.chart;
                    if (!chart || !chart.result || chart.error) throw new Error('Invalid symbol');
                    
                    const result = chart.result[0];
                    const meta = result.meta;
                    
                    const price = meta.regularMarketPrice;
                    const previousClose = meta.chartPreviousClose || meta.previousClose || price;
                    const name = meta.longName || meta.shortName || symbol;
                    
                    let assetType = 'stock';
                    if (meta.instrumentType) {
                        if (meta.instrumentType.includes('MUTUALFUND')) assetType = 'fund';
                        else if (meta.instrumentType.includes('ETF')) assetType = 'etf';
                    }
                    
                    return {
                        symbol: symbol.toUpperCase(),
                        name,
                        price,
                        previousPrice: previousClose,
                        lastUpdated: new Date(),
                        assetType
                    };
                }

                async fetchAssetData(symbol) {
                    const upper = symbol.toUpperCase();
                    const cached = this.cache.get(upper);
                    if (cached && Date.now() - cached.timestamp < this.CACHE_TTL) return cached.data;

                    try {
                        let data;
                        if (this._isCrypto(upper)) {
                            data = await this._fetchCrypto(upper);
                        } else {
                            data = await this._fetchYahoo(upper);
                        }
                        this.cache.set(upper, { data, timestamp: Date.now() });
                        return data;
                    } catch (e) {
                        if (cached) return cached.data;
                        throw new Error(`"${symbol}" not found. Check symbol.`);
                    }
                }

                async refreshMultiple(symbols, skipCache = false) {
                    if (skipCache) symbols.forEach(s => this.cache.delete(s.toUpperCase()));
                    const results = await Promise.all(symbols.map(s => this.fetchAssetData(s).catch(() => null)));
                    return results.filter(r => r !== null);
                }

                clearCache() { this.cache.clear(); }
            }

            const assetApi = new AssetService();

            // ---------- State ----------
            let watchlist = [];
            let portfolio = [];
            
            let isRefreshing = false;
            let lastRefresh = null;
            let isOffline = !navigator.onLine;
            let apiError = null;
            let refreshIntervalId = null;
            
            let modal = { open: false, type: null };
            let previousPrices = new Map();

            function getAllSymbols() {
                const wSymbols = watchlist.map(s => s.symbol);
                const pSymbols = portfolio.map(s => s.symbol);
                return [...new Set([...wSymbols, ...pSymbols])];
            }

            async function smoothRefreshAll(skipCache = false) {
                const symbols = getAllSymbols();
                if (symbols.length === 0) return;
                if (isRefreshing) return;
                isRefreshing = true;
                
                const refreshBtn = document.querySelector('.global-refresh-btn');
                if (refreshBtn) {
                    refreshBtn.classList.add('refresh-pulse');
                    setTimeout(() => refreshBtn.classList.remove('refresh-pulse'), 500);
                }
                
                try {
                    watchlist.forEach(s => previousPrices.set(s.symbol, s.price));
                    portfolio.forEach(p => previousPrices.set(p.symbol, p.currentPrice ?? p.buyPrice));
                    
                    const updated = await assetApi.refreshMultiple(symbols, skipCache);
                    const priceMap = new Map(updated.map(u => [u.symbol, u]));
                    
                    watchlist = watchlist.map(stock => {
                        const fresh = priceMap.get(stock.symbol);
                        if (fresh) return { ...stock, price: fresh.price, previousPrice: fresh.previousPrice, name: fresh.name, assetType: fresh.assetType };
                        return stock;
                    });
                    
                    portfolio = portfolio.map(item => {
                        const fresh = priceMap.get(item.symbol);
                        if (fresh) {
                            return { ...item, currentPrice: fresh.price, previousPrice: fresh.previousPrice, name: fresh.name, assetType: fresh.assetType };
                        }
                        return item;
                    });
                    
                    lastRefresh = new Date();
                    apiError = null;
                } catch (e) {
                    apiError = 'Partial refresh failure.';
                } finally {
                    isRefreshing = false;
                    renderApp();
                    const btn = document.querySelector('.global-refresh-btn');
                    if (btn) {
                        const span = btn.querySelector('.btn-text');
                        if (span) span.textContent = 'Refresh';
                        btn.querySelector('.refresh-icon')?.classList.remove('animate-spin');
                    }
                }
            }

            function computePortfolioStats() {
                let totalCost = 0, totalValue = 0;
                portfolio.forEach(p => {
                    const qty = p.quantity || 0;
                    const buy = p.buyPrice || 0;
                    const curr = p.currentPrice ?? buy;
                    totalCost += buy * qty;
                    totalValue += curr * qty;
                });
                return { totalCost, totalValue, totalPL: totalValue - totalCost };
            }

            function renderApp() {
                const app = document.getElementById('app');
                if (!app) return;
                const stats = computePortfolioStats();
                const filledWatch = watchlist.length;
                const filledPort = portfolio.length;
                
                app.innerHTML = `
                    <div class="max-w-[1600px] mx-auto">
                        ${renderHeader(filledWatch, filledPort)}
                        <div class="dashboard-grid">
                            ${renderWatchlistColumn()}
                            ${renderPortfolioColumn(stats)}
                        </div>
                        ${modal.open ? renderModal() : ''}
                    </div>
                `;
            }

            function renderHeader(wCount, pCount) {
                return `
                    <header class="glass-header sticky top-0 z-20 mb-4 sm:mb-6 rounded-xl sm:rounded-2xl px-4 sm:px-6 py-3 sm:py-4 flex flex-wrap items-center justify-between gap-2 sm:gap-3">
                        <div>
                            <h1 class="text-xl sm:text-2xl md:text-3xl font-bold bg-gradient-to-r from-gray-900 to-gray-700 bg-clip-text text-transparent">📊 Multi‑Asset Manager</h1>
                            <p class="text-xs sm:text-sm text-gray-500 mt-0.5">Watchlist ${wCount} · Portfolio ${pCount}</p>
                        </div>
                        <div class="flex items-center gap-2 sm:gap-3">
                            ${isOffline ? `<div class="bg-amber-100/80 px-2 sm:px-3 py-1 sm:py-1.5 rounded-full text-xs sm:text-sm text-amber-800 flex items-center gap-1"><span>⚠️ Offline</span></div>` : ''}
                            <button onclick="window.handleManualRefresh()" class="global-refresh-btn glass-button rounded-full px-3 sm:px-5 py-1.5 sm:py-2 text-white text-sm sm:text-base font-medium flex items-center gap-1.5 sm:gap-2 disabled:opacity-50" ${(wCount+pCount===0)?'disabled':''}>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="refresh-icon"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                                <span class="btn-text">${isRefreshing ? 'Refreshing...' : 'Refresh'}</span>
                            </button>
                        </div>
                        ${lastRefresh ? `<p class="w-full text-xs text-gray-400 mt-1">Updated ${lastRefresh.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>` : ''}
                        ${apiError ? `<div class="w-full text-xs sm:text-sm text-red-600 bg-red-50/70 px-3 py-1.5 rounded-lg">${apiError}</div>` : ''}
                    </header>
                `;
            }

            function renderWatchlistColumn() {
                const stocks = watchlist;
                return `
                    <div class="column-container">
                        <div class="flex items-center justify-between px-1">
                            <h2 class="text-base sm:text-lg md:text-xl font-semibold text-gray-800">📈 Watchlist</h2>
                            <span class="text-xs sm:text-sm bg-white/50 px-2 sm:px-3 py-0.5 sm:py-1 rounded-full">${stocks.length}</span>
                        </div>
                        <div class="cards-grid">
                            ${stocks.map((stock, idx) => renderWatchlistCard(stock, idx)).join('')}
                            ${renderWatchlistAddCard()}
                        </div>
                    </div>
                `;
            }

            function renderWatchlistCard(stock, index) {
                const prev = previousPrices.get(stock.symbol) ?? stock.price;
                const change = stock.price - stock.previousPrice;
                const changePercent = stock.previousPrice ? (change / stock.previousPrice) * 100 : 0;
                const direction = stock.price > prev ? 'up' : stock.price < prev ? 'down' : 'neutral';
                const priceClass = direction === 'up' ? 'price-up' : direction === 'down' ? 'price-down' : 'price-neutral';
                const assetType = stock.assetType || 'stock';
                const badgeConfig = {
                    'crypto': { text: '₿ CRYPTO', color: 'bg-orange-100 text-orange-700' },
                    'fund': { text: '📈 FUND', color: 'bg-purple-100 text-purple-700' },
                    'etf': { text: '📊 ETF', color: 'bg-blue-100 text-blue-700' },
                    'stock': { text: '📈 STOCK', color: 'bg-gray-100 text-gray-700' }
                };
                const badge = badgeConfig[assetType] || badgeConfig.stock;
                return `
                    <div class="glass-card rounded-xl sm:rounded-2xl p-3 sm:p-4 relative group fade-in">
                        <button onclick="window.handleRemoveWatchlist('${stock.symbol}')" class="remove-button absolute top-2 right-2 sm:top-3 sm:right-3 opacity-0 group-hover:opacity-100 transition p-1 sm:p-1.5 rounded-full hover:bg-gray-100/50">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </button>
                        <div class="pr-5 sm:pr-6">
                            <h3 class="font-semibold text-gray-900 truncate text-sm sm:text-base">${stock.name} <span class="asset-badge ${badge.color}">${badge.text}</span></h3>
                            <p class="text-xs sm:text-sm text-gray-500">${stock.symbol}</p>
                        </div>
                        <div class="mt-2 sm:mt-3">
                            <p class="text-lg sm:text-xl md:text-2xl font-bold ${priceClass}">$${stock.price.toFixed(2)}</p>
                            <p class="text-xs sm:text-sm font-semibold ${change>=0?'text-green-600':'text-red-600'}">
                                ${change>=0?'↑':'↓'} ${change>=0?'+':''}${change.toFixed(2)} (${changePercent>=0?'+':''}${changePercent.toFixed(2)}%)
                            </p>
                        </div>
                    </div>
                `;
            }

            function renderWatchlistAddCard() {
                return `
                    <button onclick="window.openModal('watchlist')" class="glass-empty rounded-xl sm:rounded-2xl w-full min-h-[140px] sm:min-h-[160px] flex items-center justify-center group">
                        <div class="flex flex-col items-center gap-1.5 sm:gap-2">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400 group-hover:text-blue-500"><path d="M12 5v14M5 12h14"/></svg>
                            <span class="text-xs sm:text-sm font-medium text-gray-600">Add Asset</span>
                        </div>
                    </button>
                `;
            }

            function renderPortfolioColumn(stats) {
                const holdings = portfolio;
                return `
                    <div class="column-container">
                        <div class="flex items-center justify-between px-1">
                            <h2 class="text-base sm:text-lg md:text-xl font-semibold text-gray-800">💼 Portfolio</h2>
                            <span class="text-xs sm:text-sm bg-white/50 px-2 sm:px-3 py-0.5 sm:py-1 rounded-full">${holdings.length}</span>
                        </div>
                        <div class="cards-grid">
                            ${holdings.map((item, idx) => renderPortfolioCard(item, idx)).join('')}
                            ${renderPortfolioAddCard()}
                        </div>
                        ${holdings.length > 0 ? renderPortfolioFooter(stats) : ''}
                    </div>
                `;
            }

            function renderPortfolioCard(item, index) {
                const curr = item.currentPrice ?? item.buyPrice;
                const buy = item.buyPrice;
                const qty = item.quantity;
                const pl = (curr - buy) * qty;
                const plPercent = buy ? ((curr - buy) / buy) * 100 : 0;
                const value = curr * qty;
                const plClass = pl >= 0 ? 'text-green-600' : 'text-red-600';
                const assetType = item.assetType || 'stock';
                const badgeConfig = {
                    'crypto': { text: '₿ CRYPTO', color: 'bg-orange-100 text-orange-700' },
                    'fund': { text: '📈 FUND', color: 'bg-purple-100 text-purple-700' },
                    'etf': { text: '📊 ETF', color: 'bg-blue-100 text-blue-700' },
                    'stock': { text: '📈 STOCK', color: 'bg-gray-100 text-gray-700' }
                };
                const badge = badgeConfig[assetType] || badgeConfig.stock;
                return `
                    <div class="glass-card rounded-xl sm:rounded-2xl p-3 sm:p-4 relative group fade-in">
                        <button onclick="window.handleRemovePortfolio('${item.symbol}')" class="remove-button absolute top-2 right-2 sm:top-3 sm:right-3 opacity-0 group-hover:opacity-100 transition p-1 sm:p-1.5 rounded-full hover:bg-gray-100/50">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </button>
                        <div class="pr-4 sm:pr-5">
                            <h3 class="font-semibold text-gray-900 truncate text-sm sm:text-base">${item.name} <span class="asset-badge ${badge.color}">${badge.text}</span></h3>
                            <p class="text-xs sm:text-sm text-gray-500">${item.symbol} · ${qty}</p>
                        </div>
                        <div class="mt-2 sm:mt-3 grid grid-cols-2 gap-0.5 sm:gap-1 text-xs sm:text-sm">
                            <span class="text-gray-500">Buy:</span><span class="font-medium">$${buy.toFixed(2)}</span>
                            <span class="text-gray-500">Curr:</span><span class="font-medium">$${curr.toFixed(2)}</span>
                            <span class="text-gray-500">Val:</span><span class="font-medium">$${value.toFixed(2)}</span>
                        </div>
                        <div class="mt-1.5 sm:mt-2 pt-1.5 sm:pt-2 border-t border-gray-200/60">
                            <p class="text-xs sm:text-sm font-semibold ${plClass}">
                                P/L: ${pl>=0?'+':''}$${pl.toFixed(2)} (${plPercent>=0?'+':''}${plPercent.toFixed(2)}%)
                            </p>
                        </div>
                    </div>
                `;
            }

            function renderPortfolioAddCard() {
                return `
                    <button onclick="window.openModal('portfolio')" class="glass-empty rounded-xl sm:rounded-2xl w-full min-h-[140px] sm:min-h-[160px] flex items-center justify-center group">
                        <div class="flex flex-col items-center gap-1.5 sm:gap-2">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="text-gray-400 group-hover:text-emerald-500"><path d="M12 5v14M5 12h14"/></svg>
                            <span class="text-xs sm:text-sm font-medium text-gray-600">Add Holding</span>
                        </div>
                    </button>
                `;
            }

            function renderPortfolioFooter(stats) {
                const totalPL = stats.totalPL;
                const plColor = totalPL >= 0 ? 'text-green-700' : 'text-red-700';
                return `
                    <div class="portfolio-footer mt-1.5 sm:mt-2">
                        <div class="flex justify-between items-center">
                            <span class="text-sm sm:text-base font-semibold text-gray-800">Total P/L</span>
                            <span class="text-base sm:text-lg md:text-xl font-bold ${plColor}">${totalPL>=0?'+':''}$${totalPL.toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between text-xs sm:text-sm text-gray-500 mt-0.5 sm:mt-1">
                            <span>Cost: $${stats.totalCost.toFixed(2)}</span>
                            <span>Value: $${stats.totalValue.toFixed(2)}</span>
                        </div>
                    </div>
                `;
            }

            function renderModal() {
                const isWatch = modal.type === 'watchlist';
                return `
                    <div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-3" onclick="window.closeModalOutside(event)">
                        <div class="glass-modal rounded-xl sm:rounded-2xl p-4 sm:p-6 w-full max-w-md shadow-2xl" onclick="event.stopPropagation()">
                            <div class="flex justify-between items-center mb-3 sm:mb-4">
                                <h2 class="text-lg sm:text-xl md:text-2xl font-bold text-gray-900">${isWatch ? 'Add to Watchlist' : 'Add Holding'}</h2>
                                <button onclick="window.closeModal()" class="p-1 sm:p-1.5 hover:bg-gray-100 rounded-full"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
                            </div>
                            <form onsubmit="window.handleAddSubmit(event, '${modal.type}')">
                                <div class="space-y-3 sm:space-y-4">
                                    <div>
                                        <label class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1">Symbol</label>
                                        <input type="text" id="modal-symbol" class="glass-input w-full px-3 sm:px-4 py-2 sm:py-2.5 rounded-lg sm:rounded-xl text-sm sm:text-base uppercase" autocomplete="off" placeholder="AAPL, BTC, VFIAX, SPY..." required>
                                        <p class="text-xs text-gray-400 mt-1">Stocks, ETFs, mutual funds, or crypto</p>
                                    </div>
                                    ${!isWatch ? `
                                        <div class="grid grid-cols-2 gap-2 sm:gap-3">
                                            <div>
                                                <label class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1">Buy Price ($)</label>
                                                <input type="number" step="0.01" min="0.01" id="modal-buy" class="glass-input w-full px-3 sm:px-4 py-2 sm:py-2.5 rounded-lg sm:rounded-xl text-sm sm:text-base" required>
                                            </div>
                                            <div>
                                                <label class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1">Quantity</label>
                                                <input type="number" step="any" min="0.000001" id="modal-qty" class="glass-input w-full px-3 sm:px-4 py-2 sm:py-2.5 rounded-lg sm:rounded-xl text-sm sm:text-base" required>
                                            </div>
                                        </div>
                                    ` : ''}
                                    <div id="modal-error" class="hidden p-2 sm:p-3 bg-red-50 rounded-lg sm:rounded-xl border border-red-200 text-xs sm:text-sm text-red-600"></div>
                                    <div class="flex gap-2 sm:gap-3 pt-1 sm:pt-2">
                                        <button type="button" onclick="window.closeModal()" class="flex-1 px-3 sm:px-4 py-2 sm:py-2.5 border border-gray-300 rounded-lg sm:rounded-xl text-sm sm:text-base">Cancel</button>
                                        <button type="submit" id="modal-submit" class="flex-1 px-3 sm:px-4 py-2 sm:py-2.5 bg-blue-600 text-white rounded-lg sm:rounded-xl hover:bg-blue-700 disabled:opacity-50 text-sm sm:text-base">Add</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
            }

            // ---------- Global handlers ----------
            window.openModal = (type) => {
                modal = { open: true, type };
                renderApp();
                setTimeout(() => document.getElementById('modal-symbol')?.focus(), 80);
            };
            window.closeModal = () => { modal.open = false; renderApp(); };
            window.closeModalOutside = (e) => { if (e.target === e.currentTarget) window.closeModal(); };

            window.handleAddSubmit = async (e, type) => {
                e.preventDefault();
                const symbolInput = document.getElementById('modal-symbol');
                const symbol = symbolInput.value.trim().toUpperCase();
                if (!symbol) return;
                
                const submitBtn = document.getElementById('modal-submit');
                const errorDiv = document.getElementById('modal-error');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Checking...';
                
                try {
                    const assetData = await assetApi.fetchAssetData(symbol);
                    if (type === 'watchlist') {
                        if (watchlist.some(s => s.symbol === symbol)) throw new Error('Already in watchlist');
                        watchlist.push({ ...assetData });
                        previousPrices.set(symbol, assetData.price);
                    } else {
                        const buyPrice = parseFloat(document.getElementById('modal-buy').value);
                        const quantity = parseFloat(document.getElementById('modal-qty').value);
                        if (isNaN(buyPrice) || buyPrice <= 0) throw new Error('Valid buy price required');
                        if (isNaN(quantity) || quantity <= 0) throw new Error('Valid quantity required');
                        if (portfolio.some(p => p.symbol === symbol)) throw new Error('Holding already exists');
                        
                        portfolio.push({
                            symbol: assetData.symbol,
                            name: assetData.name,
                            assetType: assetData.assetType,
                            buyPrice, quantity,
                            currentPrice: assetData.price,
                            previousPrice: assetData.previousPrice
                        });
                    }
                    saveToStorage();
                    window.closeModal();
                    startAutoRefreshIfNeeded();
                    await smoothRefreshAll(true);
                } catch (err) {
                    errorDiv.classList.remove('hidden');
                    errorDiv.textContent = err.message;
                    symbolInput.classList.add('shake');
                    setTimeout(() => symbolInput.classList.remove('shake'), 400);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Add';
                }
            };

            window.handleRemoveWatchlist = (symbol) => {
                watchlist = watchlist.filter(s => s.symbol !== symbol);
                previousPrices.delete(symbol);
                saveToStorage();
                renderApp();
                if (watchlist.length === 0 && portfolio.length === 0) stopAutoRefresh();
            };
            
            window.handleRemovePortfolio = (symbol) => {
                portfolio = portfolio.filter(p => p.symbol !== symbol);
                saveToStorage();
                renderApp();
                if (watchlist.length === 0 && portfolio.length === 0) stopAutoRefresh();
            };

            window.handleManualRefresh = async () => {
                if (isRefreshing) return;
                const btn = document.querySelector('.global-refresh-btn');
                if (btn) {
                    btn.querySelector('.btn-text').textContent = 'Refreshing...';
                    btn.querySelector('.refresh-icon')?.classList.add('animate-spin');
                }
                assetApi.clearCache();
                await smoothRefreshAll(true);
            };

            // ---------- Storage ----------
            function saveToStorage() {
                localStorage.setItem('multi_watchlist', JSON.stringify(watchlist.map(s => ({ symbol: s.symbol, name: s.name, assetType: s.assetType }))));
                localStorage.setItem('multi_portfolio', JSON.stringify(portfolio.map(p => ({
                    symbol: p.symbol, name: p.name, assetType: p.assetType, buyPrice: p.buyPrice, quantity: p.quantity
                }))));
            }
            
            async function loadFromStorage() {
                try {
                    const wSaved = localStorage.getItem('multi_watchlist');
                    const pSaved = localStorage.getItem('multi_portfolio');
                    if (wSaved) {
                        const wList = JSON.parse(wSaved);
                        for (let item of wList) {
                            try {
                                const data = await assetApi.fetchAssetData(item.symbol);
                                watchlist.push(data);
                                previousPrices.set(data.symbol, data.price);
                            } catch (e) { console.warn(`Failed to load ${item.symbol}`); }
                        }
                    }
                    if (pSaved) {
                        const pList = JSON.parse(pSaved);
                        for (let item of pList) {
                            try {
                                const data = await assetApi.fetchAssetData(item.symbol);
                                portfolio.push({
                                    symbol: data.symbol, name: data.name, assetType: data.assetType,
                                    buyPrice: item.buyPrice, quantity: item.quantity,
                                    currentPrice: data.price, previousPrice: data.previousPrice
                                });
                            } catch (e) { console.warn(`Failed to load portfolio ${item.symbol}`); }
                        }
                    }
                } catch (e) { localStorage.clear(); }
            }

            // ---------- Auto refresh ----------
            function startAutoRefreshIfNeeded() {
                if (refreshIntervalId) return;
                if (watchlist.length === 0 && portfolio.length === 0) return;
                refreshIntervalId = setInterval(() => {
                    if (navigator.onLine && !isRefreshing) smoothRefreshAll();
                }, REFRESH_INTERVAL);
                setTimeout(() => smoothRefreshAll(), 800);
            }
            function stopAutoRefresh() {
                if (refreshIntervalId) clearInterval(refreshIntervalId);
                refreshIntervalId = null;
            }

            window.addEventListener('online', () => { isOffline = false; renderApp(); });
            window.addEventListener('offline', () => { isOffline = true; renderApp(); });

            document.addEventListener('DOMContentLoaded', async () => {
                await loadFromStorage();
                renderApp();
                startAutoRefreshIfNeeded();
            });
        })();
    </script>
</body>
</html>
